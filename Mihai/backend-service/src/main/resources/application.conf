ctx {
  dataSourceClassName = "org.postgresql.ds.PGSimpleDataSource"
  dataSource {
    user = "postgres"
    user = ${?DB_USER}

    password = "password"
    password = ${?DB_PASSWORD}

    databaseName = "skylanders_shop"
    databaseName = ${?DB_NAME}

    serverName = "localhost"
    serverName = ${?DB_HOST}

    portNumber = 5432
  }
  connectionTimeout = 30000
}